<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Presenze Cantieri</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2334;--border:#2a3045;--accent:#4f8ef7;--accent2:#34d399;--accent3:#f59e0b;--accent4:#f87171;--text:#e8eaf0;--muted:#6b7280}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:24px;min-height:100vh}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.header h1{font-size:21px;font-weight:600;letter-spacing:-.5px}
.header p{color:var(--muted);font-size:12px;margin-top:3px;font-family:monospace}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;font-family:monospace;color:var(--accent2)}
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-family:monospace;font-size:14px;line-height:2.4}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#2a1a1a;border:1px solid var(--accent4);border-radius:10px;padding:20px;color:var(--accent4);font-size:13px;margin:20px 0;font-family:monospace;line-height:2}
.warn-box{background:#2a2318;border:1px solid var(--accent3);border-radius:10px;padding:14px 18px;color:var(--accent3);font-size:12px;margin-bottom:16px;font-family:monospace;line-height:1.7;display:none}
.retry-btn{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:7px;font-size:13px;cursor:pointer;margin-top:12px}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;color:var(--muted);font-family:monospace}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;outline:none;cursor:pointer}
select:focus,select:hover{border-color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc)}
.kpi-label{font-size:10px;color:var(--muted);font-family:monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.kpi-value{font-size:28px;font-weight:600;font-family:monospace;color:var(--kc);line-height:1}
.kpi-value.small{font-size:20px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-title{font-size:10px;color:var(--muted);font-family:monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.card-title b{color:var(--text);font-size:13px;font-family:system-ui;font-weight:600;text-transform:none;letter-spacing:0}
.chart-wrap{position:relative;height:220px}
.heatmap-wrap{overflow-x:auto;padding-bottom:6px}
.hm-head{display:flex;gap:2px;margin-bottom:4px}
.hm-spacer{flex-shrink:0}
.hm-day{width:23px;text-align:center;font-size:9px;color:var(--muted);font-family:monospace;flex-shrink:0}
.hm-row{display:flex;gap:2px;align-items:center;margin-bottom:3px}
.hm-name{font-size:10px;color:var(--muted);font-family:monospace;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-cell{width:23px;height:23px;border-radius:3px;cursor:pointer;transition:transform .12s;flex-shrink:0}
.hm-cell:hover{transform:scale(1.3);z-index:10;position:relative}
.table-wrap{overflow-x:auto;max-height:260px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:10px;font-family:monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
tr:hover td{background:var(--surface2)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-family:monospace;background:rgba(79,142,247,.15);color:var(--accent)}
.tb{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-family:monospace;background:rgba(79,142,247,.12);color:var(--accent)}
.badge-uff{background:rgba(52,211,153,.12);color:var(--accent2);font-size:10px;padding:1px 6px;border-radius:4px;font-family:monospace;margin-left:4px}
.dip-list{display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto}
.dip-row{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--surface2);border-radius:7px}
.dip-info{display:flex;flex-direction:column;gap:2px}
.dip-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.dip-sub{font-size:10px;color:var(--muted);font-family:monospace}
.dip-cost{font-family:monospace;color:var(--accent3);font-size:13px;font-weight:600}
.tooltip{position:fixed;background:#1e2334;border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:11px;pointer-events:none;z-index:9999;display:none;font-family:monospace;line-height:1.8;white-space:pre}
.no-data{color:var(--muted);font-size:12px;text-align:center;padding:24px;font-family:monospace}
</style>
</head>
<body>
<div class="tooltip" id="tip"></div>

<div id="loading-screen" class="loading">
  <div class="spinner"></div><br>
  Caricamento dati…
</div>

<div id="dashboard" style="display:none">
  <div class="header">
    <div>
      <h1>Dashboard Presenze Cantieri</h1>
      <p id="hdr-sub">Solo entrate · Geobadge HR</p>
    </div>
    <div class="badge" id="hdr-badge">—</div>
  </div>

  <div class="warn-box" id="warn-box"></div>

  <div class="filters">
    <span class="fl">mese</span><select id="f-mese"></select>
    <span class="fl">cantiere</span><select id="f-cant"></select>
    <span class="fl">dipendente</span><select id="f-dip"></select>
  </div>

  <div class="kpi-grid" id="kpis"></div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Presenze giornaliere <b id="lbl-bar"></b></div>
      <div class="chart-wrap"><canvas id="c-bar"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Distribuzione <b>per cantiere</b></div>
      <div class="chart-wrap"><canvas id="c-pie"></canvas></div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Costo stimato per cantiere <b id="lbl-cost"></b></div>
      <div class="chart-wrap"><canvas id="c-cost-cant"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Costo per dipendente <b></b></div>
      <div class="chart-wrap"><canvas id="c-cost-dip"></canvas></div>
    </div>
  </div>

  <div class="card" style="margin:14px 0">
    <div class="card-title">Heatmap presenze <b id="lbl-hm"></b></div>
    <div class="heatmap-wrap" id="hm"></div>
  </div>

  <div class="grid3">
    <div class="card">
      <div class="card-title">Dettaglio entrate <b id="lbl-tbl"></b></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Data</th><th>Ora</th><th>Dipendente</th><th>Tariffa</th><th>Cantiere</th><th>Costo</th></tr></thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Chi ha lavorato <b id="lbl-dip"></b></div>
      <div class="dip-list" id="dips"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   CONFIG — COMPILA I 3 VALORI QUI SOTTO UNA SOLA VOLTA
   ═══════════════════════════════════════════════════════════════════════ */

// 1) URL CSV delle presenze (publish-to-web del tab Foglio1 di ERP_workforce)
const URL_PRESENZE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSh4s5_G_F6JSMly4krWfEVbYZCLDRsddlIX0OlfQs4Lhqk2OKOB_oYOXgYY0YlL9nvKz5hWkkq2jYD/pub?gid=0&single=true&output=csv';

// 2) ID del foglio ERP_workforce (contiene il tab "Tariffe_Workforce").
//    È la stringa tra /d/ e /edit nell'URL del foglio.
//    Requisito: foglio condiviso come "Chiunque con il link → Visualizzatore".
const WORKFORCE_SHEET_ID = '1pLpA0cmVD6Txhm4c4jV9-1jP_MtA1V1SdIla9PgMz-8';

// 3) ID del foglio master (contiene il tab "cantieri").
//    Lascia stringa vuota '' se non vuoi usare la mappatura cantieri.
const MASTER_SHEET_ID = '1Hnh9GkMXigTwCKs92ts3H8N1TvZUN1s4_WT7HKXhfRg';

// 4) Tariffa giornaliera di default se un dipendente non è in Tariffe_Workforce
const TARIFFA_DEFAULT = 100;

/* ═══════════════════════════════════════════════════════════════════════
   FINE CONFIG — da qui in giù non serve toccare nulla
   ═══════════════════════════════════════════════════════════════════════ */

const URL_TARIFFE  = `https://docs.google.com/spreadsheets/d/${WORKFORCE_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Tariffe_Workforce`;
const URL_CANTIERI = MASTER_SHEET_ID
  ? `https://docs.google.com/spreadsheets/d/${MASTER_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=cantieri`
  : null;

const COLORS = ['#4f8ef7','#34d399','#f59e0b','#f87171','#a78bfa','#fb923c','#22d3ee','#ec4899','#84cc16','#14b8a6'];

// ── Lookup dinamici popolati al boot ─────────────────────────────────────
let TARIFFE = {};          // { nome_lower: { tariffa_giornaliera, ruolo, area } }
let CANTIERI_MAP = {};     // { nome_presenze: label_unificata }

function tariffa(nome){
  const n = (nome||'').toLowerCase().trim();
  return (TARIFFE[n] && TARIFFE[n].tariffa_giornaliera) || TARIFFA_DEFAULT;
}
function isUfficio(nome){
  const n = (nome||'').toLowerCase().trim();
  return TARIFFE[n] && TARIFFE[n].area === 'ufficio';
}
function labelCantiere(raw){
  return CANTIERI_MAP[raw] || raw;
}
function eur(v){ return '€'+Number(v).toLocaleString('it-IT'); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtMese(m){
  if(!m||m==='all') return 'tutti i mesi';
  const [y,mo] = m.split('-');
  return new Date(+y,+mo-1).toLocaleString('it-IT',{month:'long',year:'numeric'});
}
function num(v){
  if(!v&&v!==0) return 0;
  const s = String(v).trim().replace(/[€\s]/g,'');
  if(s.includes(',')&&s.includes('.')) return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;
  if(s.includes(',')) return parseFloat(s.replace(',','.'))||0;
  return parseFloat(s)||0;
}

// ── STATO ──────────────────────────────────────────────────────────────────
let ALL = [];
let meseOpt = 'all', cantOpt = 'all', dipOpt = 'all';
const charts = {};
const warnings = [];

function addWarning(msg){ warnings.push(msg); }
function renderWarnings(){
  if(!warnings.length) return;
  const box = document.getElementById('warn-box');
  box.innerHTML = warnings.map(w => '⚠ ' + w).join('<br>');
  box.style.display = 'block';
}

// ── FETCH ──────────────────────────────────────────────────────────────────
async function boot(){
  try {
    // Carico in parallelo: tariffe + cantieri dal master, presenze dallo sheet dedicato
    const [tariffeRes, cantieriRes, presenzeRes] = await Promise.allSettled([
      fetch(URL_TARIFFE,  {cache:'no-cache'}).then(r => r.ok ? r.text() : Promise.reject('HTTP '+r.status)),
      URL_CANTIERI
        ? fetch(URL_CANTIERI, {cache:'no-cache'}).then(r => r.ok ? r.text() : Promise.reject('HTTP '+r.status))
        : Promise.reject('disabilitato'),
      fetch(URL_PRESENZE, {cache:'no-cache'}).then(r => r.ok ? r.text() : Promise.reject('HTTP '+r.status)),
    ]);

    if(tariffeRes.status === 'fulfilled') parseTariffe(tariffeRes.value);
    else addWarning('Impossibile leggere il tab Tariffe_Workforce. Uso tariffa default €' + TARIFFA_DEFAULT + ' per tutti.');

    if(cantieriRes.status === 'fulfilled') parseCantieri(cantieriRes.value);
    else if(URL_CANTIERI) addWarning('Impossibile leggere l\'anagrafica cantieri dal master. Verranno mostrati i nomi grezzi.');

    if(presenzeRes.status !== 'fulfilled'){
      throw new Error('Presenze non caricate: ' + presenzeRes.reason);
    }
    parsePresenze(presenzeRes.value);
  } catch(e) {
    document.getElementById('loading-screen').innerHTML = `
      <div class="error-box">❌ Impossibile caricare i dati.<br>Errore: ${e.message || e}<br><br>
      <button class="retry-btn" onclick="location.reload()">↺ Riprova</button></div>`;
  }
}

function parseTariffe(csv){
  const r = Papa.parse(csv, {header:true, skipEmptyLines:true,
    transformHeader:h => h.trim().toLowerCase().replace(/[\s-]+/g,'_')});
  let n = 0;
  r.data.forEach(row => {
    const nome = (row.nome||'').toLowerCase().trim();
    if(!nome) return;
    TARIFFE[nome] = {
      tariffa_giornaliera: num(row.tariffa_giornaliera),
      ruolo: (row.ruolo||'').trim(),
      area:  (row.area||'').trim().toLowerCase(),
    };
    n++;
  });
  if(!n) addWarning('Tab Tariffe_Workforce presente ma vuoto.');
}

function parseCantieri(csv){
  const r = Papa.parse(csv, {header:true, skipEmptyLines:true,
    transformHeader:h => h.trim().toLowerCase().replace(/[\s-]+/g,'_')});
  r.data.forEach(row => {
    const np = (row.nome_presenze||'').trim();
    const lbl = (row.label||'').trim();
    if(np && lbl) CANTIERI_MAP[np] = lbl;
  });
}

function parsePresenze(csv){
  const r = Papa.parse(csv, {header:true, skipEmptyLines:true});
  ALL = r.data.map(row => {
    if((row.Verso||'').trim() !== 'Entrata') return null;
    const dr = (row.Data||'').trim();
    const p = dr.split('/');
    if(p.length !== 3) return null;
    const iso = `${p[2]}-${pad(p[1])}-${pad(p[0])}`;
    const nome = (row.Nome||'').trim();
    const cognome = (row.Cognome||'').trim();
    const cantiereRaw = (row.Cantiere||'').trim();
    return {
      data: iso,
      dataFmt: dr,
      mese: `${p[2]}-${pad(p[1])}`,
      ora: (row.Ora||'').trim(),
      nome, cognome,
      nc: nome + ' ' + cognome,
      matricola: (row.Matricola||'').trim(),
      cantiereRaw,
      cantiere: labelCantiere(cantiereRaw),
      costo: tariffa(nome),
    };
  }).filter(Boolean);

  if(!ALL.length){
    document.getElementById('loading-screen').innerHTML =
      `<div class="error-box">⚠️ Nessuna riga "Entrata" trovata nelle presenze.</div>`;
    return;
  }
  initUI();
}

// ── INIT UI ────────────────────────────────────────────────────────────────
function initUI(){
  const mesi  = [...new Set(ALL.map(r=>r.mese))].sort().reverse();
  const cants = [...new Set(ALL.map(r=>r.cantiere))].filter(Boolean).sort();
  const dips  = [...new Set(ALL.map(r=>r.nc))].sort();
  meseOpt = mesi[0] || 'all';

  document.getElementById('hdr-sub').textContent =
    `Solo entrate · ${ALL.length} timbrature · ${Object.keys(TARIFFE).length} tariffe caricate`;
  document.getElementById('hdr-badge').textContent =
    `aggiornato ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;

  const fM = document.getElementById('f-mese');
  const fC = document.getElementById('f-cant');
  const fD = document.getElementById('f-dip');

  fM.innerHTML = '<option value="all">Tutti i mesi</option>' +
    mesi.map(m => `<option value="${m}"${m===meseOpt?' selected':''}>${fmtMese(m)}</option>`).join('');
  fC.innerHTML = '<option value="all">Tutti i cantieri</option>' +
    cants.map(c => `<option value="${c}">${c}</option>`).join('');
  fD.innerHTML = '<option value="all">Tutti</option>' +
    dips.map(d => `<option value="${d}">${d}</option>`).join('');

  fM.onchange = e => { meseOpt = e.target.value; render(); };
  fC.onchange = e => { cantOpt = e.target.value; render(); };
  fD.onchange = e => { dipOpt  = e.target.value; render(); };

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderWarnings();
  setTimeout(render, 60);
}

function filt(){
  return ALL.filter(r =>
    (meseOpt==='all' || r.mese===meseOpt) &&
    (cantOpt==='all' || r.cantiere===cantOpt) &&
    (dipOpt==='all'  || r.nc===dipOpt)
  );
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const d = filt();
  renderKPI(d);
  setTimeout(() => renderBar(d), 0);
  setTimeout(() => renderPie(d), 0);
  setTimeout(() => renderCostCant(d), 0);
  setTimeout(() => renderCostDip(d), 0);
  renderHeatmap(d);
  renderTable(d);
  renderDipList(d);
}

function destroyChart(key){
  if(charts[key]){ try{ charts[key].destroy(); }catch(e){} charts[key]=null; }
}

function renderKPI(d){
  const presSet = new Set(d.map(r=>r.nc+'|'+r.data));
  const dipSet  = new Set(d.map(r=>r.nc));
  const cantSet = new Set(d.map(r=>r.cantiere).filter(Boolean));
  const costoTot = d.reduce((s,r)=>s+r.costo,0);
  document.getElementById('kpis').innerHTML = [
    {l:'Presenze totali',   v:presSet.size,  s:'entrate uniche dip×giorno',            c:'var(--accent)'},
    {l:'Dipendenti attivi', v:dipSet.size,   s:'nel periodo selezionato',              c:'var(--accent2)'},
    {l:'Cantieri attivi',   v:cantSet.size,  s:'con almeno 1 entrata',                 c:'var(--accent3)'},
    {l:'Costo stimato',     v:eur(costoTot), s:'tariffe per dipendente dal master',    c:'var(--accent4)'},
  ].map(k => `
    <div class="kpi" style="--kc:${k.c}">
      <div class="kpi-label">${k.l}</div>
      <div class="kpi-value${typeof k.v==='string'?' small':''}">${k.v}</div>
      <div class="kpi-sub">${k.s}</div>
    </div>`).join('');
}

function renderBar(d){
  const el = document.getElementById('c-bar');
  if(!el) return;
  const giorni = [...new Set(d.map(r=>r.data))].sort();
  const cants = cantOpt==='all'
    ? [...new Set(d.map(r=>r.cantiere))].filter(Boolean).sort()
    : [cantOpt];
  document.getElementById('lbl-bar').textContent = fmtMese(meseOpt);
  destroyChart('bar');
  charts.bar = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: giorni.map(g => g.slice(8)+'/'+g.slice(5,7)),
      datasets: cants.map((c,i) => ({
        label: c.length>20 ? c.slice(0,20)+'…' : c,
        data:  giorni.map(g => new Set(d.filter(r => r.data===g && r.cantiere===c).map(r=>r.nc)).size),
        backgroundColor: COLORS[i%COLORS.length]+'bb',
        borderColor:     COLORS[i%COLORS.length],
        borderWidth: 1, borderRadius: 3, stack: 's',
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#6b7280', font:{size:10}, boxWidth:10 } } },
      scales: {
        x: { ticks:{color:'#6b7280',font:{size:9}}, grid:{color:'#2a3045'}, stacked:true },
        y: { ticks:{color:'#6b7280',stepSize:1}, grid:{color:'#2a3045'}, beginAtZero:true, stacked:true },
      },
    },
  });
}

function renderPie(d){
  const el = document.getElementById('c-pie');
  if(!el) return;
  const cnt = {};
  d.forEach(r => { cnt[r.cantiere] = (cnt[r.cantiere]||0) + 1; });
  const labels = Object.keys(cnt).filter(Boolean);
  destroyChart('pie');
  charts.pie = new Chart(el.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: labels.map(l=>cnt[l]), backgroundColor: COLORS.slice(0, labels.length), borderWidth:0, hoverOffset:6 }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: { legend: { position:'bottom', labels:{color:'#6b7280',font:{size:10},padding:8,boxWidth:10} } },
    },
  });
}

function renderCostCant(d){
  const el = document.getElementById('c-cost-cant');
  if(!el) return;
  const cants = [...new Set(d.map(r=>r.cantiere))].filter(Boolean).sort();
  const costs = cants.map(c => d.filter(r=>r.cantiere===c).reduce((s,r)=>s+r.costo,0));
  document.getElementById('lbl-cost').textContent = fmtMese(meseOpt);
  destroyChart('costCant');
  charts.costCant = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: cants.map(c => c.length>24 ? c.slice(0,24)+'…' : c),
      datasets: [{ data:costs, backgroundColor: COLORS.map(c=>c+'99'), borderColor: COLORS, borderWidth:1, borderRadius:5 }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: {display:false}, tooltip: {callbacks:{ label: c => ' '+eur(c.parsed.x) }} },
      scales: {
        x: { ticks:{color:'#6b7280',font:{size:9},callback: v => '€'+Number(v).toLocaleString('it-IT')}, grid:{color:'#2a3045'} },
        y: { ticks:{color:'#6b7280',font:{size:10}}, grid:{color:'#2a3045'} },
      },
    },
  });
}

function renderCostDip(d){
  const el = document.getElementById('c-cost-dip');
  if(!el) return;
  const dps = [...new Set(d.map(r=>r.nc))].sort();
  const costs = dps.map(n => d.filter(r=>r.nc===n).reduce((s,r)=>s+r.costo,0));
  destroyChart('costDip');
  charts.costDip = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: dps.map(n => n.length>18 ? n.slice(0,18)+'…' : n),
      datasets: [{ data:costs, backgroundColor: COLORS.map(c=>c+'99'), borderColor: COLORS, borderWidth:1, borderRadius:5 }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: {display:false}, tooltip: {callbacks:{ label: c => ' '+eur(c.parsed.x) }} },
      scales: {
        x: { ticks:{color:'#6b7280',font:{size:9},callback: v => '€'+Number(v).toLocaleString('it-IT')}, grid:{color:'#2a3045'} },
        y: { ticks:{color:'#6b7280',font:{size:10}}, grid:{color:'#2a3045'} },
      },
    },
  });
}

function renderHeatmap(d){
  const giorni = [...new Set(d.map(r=>r.data))].sort();
  const dps    = [...new Set(d.map(r=>r.nc))].sort();
  const allC   = [...new Set(d.map(r=>r.cantiere))].filter(Boolean).sort();
  const cc = {}; allC.forEach((c,i) => cc[c] = COLORS[i%COLORS.length]);
  const W = 128;

  let html = `<div class="hm-head"><div class="hm-spacer" style="width:${W}px;flex-shrink:0"></div>`;
  giorni.forEach(g => { html += `<div class="hm-day">${g.slice(8)}</div>`; });
  html += '</div>';

  dps.forEach(dp => {
    html += `<div class="hm-row"><div class="hm-name" style="width:${W}px" title="${dp}">${dp}</div>`;
    giorni.forEach(g => {
      const e = d.filter(r => r.nc===dp && r.data===g);
      const n = e.length;
      const col = n ? (cc[e[0].cantiere] || '#4f8ef7') : '#1e2334';
      const tip = n ? `${dp}\n${e[0].dataFmt}  ${e[0].ora}\n${e[0].cantiere}\n${eur(e[0].costo)}/gg` : '';
      html += `<div class="hm-cell" style="background:${col};opacity:${n?.88:.13}" data-tip="${tip.replace(/"/g,'&quot;')}" onmouseenter="showTip(event,this)" onmouseleave="hideTip()"></div>`;
    });
    html += '</div>';
  });

  document.getElementById('hm').innerHTML = html;
  document.getElementById('lbl-hm').textContent = fmtMese(meseOpt);
}

function renderTable(d){
  document.getElementById('lbl-tbl').textContent = `${d.length} entrate`;
  document.getElementById('tbl').innerHTML = [...d]
    .sort((a,b) => b.data.localeCompare(a.data))
    .slice(0,300)
    .map(r => `
      <tr>
        <td style="font-family:monospace;font-size:11px">${r.dataFmt}</td>
        <td style="font-family:monospace;font-size:11px">${r.ora}</td>
        <td>${r.nc}${isUfficio(r.nome)?'<span class="badge-uff">uff</span>':''}</td>
        <td><span class="tb">${eur(r.costo)}</span></td>
        <td><span class="pill">${r.cantiere.length>26 ? r.cantiere.slice(0,26)+'…' : r.cantiere}</span></td>
        <td style="font-family:monospace;color:var(--accent3);font-size:11px">${eur(r.costo)}</td>
      </tr>`).join('');
}

function renderDipList(d){
  const lbl = cantOpt==='all' ? 'tutti i cantieri' : (cantOpt.length>22 ? cantOpt.slice(0,22)+'…' : cantOpt);
  document.getElementById('lbl-dip').textContent = lbl;
  const dc = {};
  d.forEach(r => {
    if(!dc[r.nc]) dc[r.nc] = { giorni:new Set(), costo:0, nome:r.nome };
    dc[r.nc].giorni.add(r.data);
    dc[r.nc].costo += r.costo;
  });
  const sorted = Object.entries(dc).sort((a,b) => b[1].costo - a[1].costo);
  if(!sorted.length){
    document.getElementById('dips').innerHTML = '<div class="no-data">nessun dato</div>';
    return;
  }
  document.getElementById('dips').innerHTML = sorted.map(([nc,v]) => `
    <div class="dip-row">
      <div class="dip-info">
        <div class="dip-name">${nc}${isUfficio(v.nome)?'<span class="badge-uff">uff</span>':''} <span class="tb">${eur(tariffa(v.nome))}/gg</span></div>
        <div class="dip-sub">${v.giorni.size} giorni lavorati</div>
      </div>
      <div class="dip-cost">${eur(v.costo)}</div>
    </div>`).join('');
}

function showTip(e, el){
  const t = document.getElementById('tip'), tx = el.getAttribute('data-tip');
  if(!tx) return;
  t.textContent = tx;
  t.style.display = 'block';
  t.style.left = (e.clientX + 14) + 'px';
  t.style.top  = (e.clientY - 6) + 'px';
}
function hideTip(){ document.getElementById('tip').style.display = 'none'; }

boot();
</script>
</body>
</html>
