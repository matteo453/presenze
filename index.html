<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Presenze Cantieri</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2334;--border:#2a3045;
  --accent:#4f8ef7;--accent2:#34d399;--accent3:#f59e0b;--accent4:#f87171;
  --text:#e8eaf0;--muted:#6b7280;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:24px;min-height:100vh}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.header p{color:var(--muted);font-size:12px;margin-top:4px;font-family:monospace}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;font-family:monospace;color:var(--accent2);white-space:nowrap}
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-family:monospace;font-size:14px;line-height:2.2}
.loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#2a1a1a;border:1px solid var(--accent4);border-radius:10px;padding:20px;color:var(--accent4);font-size:13px;margin:20px 0;font-family:monospace;line-height:2}
.retry-btn{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:7px;font-size:13px;cursor:pointer;margin-top:12px;display:inline-block}
.filters{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;color:var(--muted);font-family:monospace}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s}
select:focus,select:hover{border-color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc)}
.kpi-label{font-size:10px;color:var(--muted);font-family:monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.kpi-value{font-size:30px;font-weight:600;font-family:monospace;color:var(--kc)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-title{font-size:11px;color:var(--muted);font-family:monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.card-title b{color:var(--text);font-size:14px;font-family:system-ui;font-weight:600;text-transform:none;letter-spacing:0}
.chart-wrap{position:relative;height:220px}
.heatmap{overflow-x:auto;padding-bottom:6px}
.hm-day-labels{display:flex;gap:2px;padding-left:134px;margin-bottom:4px}
.hm-day-label{width:23px;text-align:center;font-size:9px;color:var(--muted);font-family:monospace;flex-shrink:0}
.heatmap-row{display:flex;gap:2px;align-items:center;margin-bottom:3px}
.hm-label{font-size:10px;color:var(--muted);font-family:monospace;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-cell{width:23px;height:23px;border-radius:4px;cursor:pointer;transition:transform .12s;flex-shrink:0;position:relative}
.hm-cell:hover{transform:scale(1.35);z-index:10}
.table-wrap{overflow-x:auto;max-height:260px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 11px;font-size:10px;font-family:monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}
td{padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.04)}
tr:hover td{background:var(--surface2)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-family:monospace;background:rgba(79,142,247,.15);color:var(--accent)}
.dip-list{display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto}
.dip-row{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--surface2);border-radius:7px;font-size:13px}
.dip-giorni{font-family:monospace;color:var(--accent);font-size:12px;font-weight:600}
.tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:11px;pointer-events:none;z-index:9999;display:none;font-family:monospace;line-height:1.8;white-space:pre;max-width:240px}
.no-data{color:var(--muted);font-size:12px;text-align:center;padding:24px;font-family:monospace}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
</style>
</head>
<body>

<div class="tooltip" id="tip"></div>
<div id="root">
  <div class="loading">
    <div class="spinner"></div><br>
    Caricamento dati da Google Sheets…
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_ID = '2PACX-1vSh4s5_G_F6JSMly4krWfEVbYZCLDRsddlIX0OlfQs4Lhqk2OKOB_oYOXgYY0YlL9nvKz5hWkkq2jYD';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=csv`;
const PROXIES  = [
  CSV_URL,
  `https://corsproxy.io/?${encodeURIComponent(CSV_URL)}`,
  `https://api.allorigins.win/raw?url=${encodeURIComponent(CSV_URL)}`,
];
const COLORS = ['#4f8ef7','#34d399','#f59e0b','#f87171','#a78bfa','#fb923c','#22d3ee','#ec4899','#84cc16','#14b8a6'];

// ── STATO ─────────────────────────────────────────────────────────────────────
let ALL = [];
let chartBar, chartPie;
let meseSelected = 'all', cantSelected = 'all', dipSelected = 'all';

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function loadData() {
  let lastErr = '';
  for (const url of PROXIES) {
    try {
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (!text || text.length < 100) throw new Error('risposta vuota');
      parseAndInit(text);
      return;
    } catch(e) { lastErr = e.message; }
  }
  document.getElementById('root').innerHTML = `
    <div class="error-box">
      ❌ Impossibile caricare i dati.<br>
      Errore: ${lastErr}<br><br>
      <b>Come risolvere:</b><br>
      1. Apri il Google Sheets<br>
      2. File → Condividi → Pubblica sul web<br>
      3. Scegli il foglio e formato CSV<br>
      4. Clicca Pubblica e ricarica questa pagina<br><br>
      <button class="retry-btn" onclick="location.reload()">↺ Riprova</button>
    </div>`;
}

function parseCSVRow(row) {
  const r = []; let c = ''; let q = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { q = !q; }
    else if (ch === ',' && !q) { r.push(c); c = ''; }
    else { c += ch; }
  }
  r.push(c);
  return r;
}

function parseAndInit(text) {
  const rows = text.trim().split('\n');
  const headers = parseCSVRow(rows[0]).map(h => h.replace(/"/g,'').trim());
  const idx = {};
  headers.forEach((h, i) => idx[h] = i);

  ALL = rows.slice(1).map(row => {
    const cols = parseCSVRow(row);
    const get  = k => (cols[idx[k]] || '').replace(/"/g,'').trim();

    // Solo entrate
    if (get('Verso') !== 'Entrata') return null;

    const dataRaw = get('Data'); // DD/MM/YYYY
    const p = dataRaw.split('/');
    if (p.length !== 3) return null;

    const iso  = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    const mese = `${p[2]}-${p[1].padStart(2,'0')}`;

    return {
      data:        iso,
      dataFmt:     dataRaw,
      mese,
      ora:         get('Ora'),
      nome:        get('Nome'),
      cognome:     get('Cognome'),
      nomeCognome: get('Nome') + ' ' + get('Cognome'),
      matricola:   get('Matricola'),
      cantiere:    get('Cantiere'),
    };
  }).filter(Boolean);

  if (!ALL.length) {
    document.getElementById('root').innerHTML = `<div class="error-box">⚠️ Nessuna riga "Entrata" trovata.<br>Controlla che la colonna "Verso" contenga esattamente il valore <b>Entrata</b>.</div>`;
    return;
  }

  buildUI();
}

// ── UI ────────────────────────────────────────────────────────────────────────
function fmtMese(m) {
  if (!m || m === 'all') return 'tutti i mesi';
  const [y, mo] = m.split('-');
  return new Date(+y, +mo - 1).toLocaleString('it-IT', { month: 'long', year: 'numeric' });
}

function buildUI() {
  const mesi     = [...new Set(ALL.map(r => r.mese))].sort().reverse();
  const cantieri = [...new Set(ALL.map(r => r.cantiere))].filter(Boolean).sort();
  const dips     = [...new Set(ALL.map(r => r.nomeCognome))].sort();
  meseSelected   = mesi[0] || 'all';

  document.getElementById('root').innerHTML = `
  <div class="header">
    <div>
      <h1>Dashboard Presenze Cantieri</h1>
      <p>Solo entrate · ${ALL.length} timbrature · Geobadge HR</p>
    </div>
    <div class="badge" id="badge">aggiornato ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}</div>
  </div>

  <div class="filters">
    <span class="fl">mese</span>
    <select id="f-mese">
      <option value="all">Tutti i mesi</option>
      ${mesi.map(m => `<option value="${m}" ${m===meseSelected?'selected':''}>${fmtMese(m)}</option>`).join('')}
    </select>
    <span class="fl">cantiere</span>
    <select id="f-cant">
      <option value="all">Tutti i cantieri</option>
      ${cantieri.map(c => `<option value="${c}">${c}</option>`).join('')}
    </select>
    <span class="fl">dipendente</span>
    <select id="f-dip">
      <option value="all">Tutti</option>
      ${dips.map(d => `<option value="${d}">${d}</option>`).join('')}
    </select>
  </div>

  <div class="kpi-grid" id="kpis"></div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Presenze giornaliere <b id="bar-lbl"></b></div>
      <div class="chart-wrap"><canvas id="c-bar"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Distribuzione <b>per cantiere</b></div>
      <div class="chart-wrap"><canvas id="c-pie"></canvas></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="card-title">Heatmap presenze <b id="hm-lbl"></b></div>
    <div class="heatmap" id="hm"></div>
  </div>

  <div class="grid3">
    <div class="card">
      <div class="card-title">Dettaglio entrate <b id="tbl-lbl"></b></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Data</th><th>Ora</th><th>Dipendente</th><th>Matricola</th><th>Cantiere</th></tr></thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Chi ha lavorato <b id="dip-lbl"></b></div>
      <div class="dip-list" id="dips"></div>
    </div>
  </div>`;

  document.getElementById('f-mese').onchange = e => { meseSelected = e.target.value; render(); };
  document.getElementById('f-cant').onchange = e => { cantSelected  = e.target.value; render(); };
  document.getElementById('f-dip').onchange  = e => { dipSelected   = e.target.value; render(); };
  render();
}

// ── FILTRO ────────────────────────────────────────────────────────────────────
function filt() {
  return ALL.filter(r =>
    (meseSelected === 'all' || r.mese      === meseSelected) &&
    (cantSelected  === 'all' || r.cantiere  === cantSelected)  &&
    (dipSelected   === 'all' || r.nomeCognome === dipSelected)
  );
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const d = filt();
  renderKPI(d);
  renderBar(d);
  renderPie(d);
  renderHeatmap(d);
  renderTable(d);
  renderDipList(d);
}

function renderKPI(d) {
  const dipSet   = new Set(d.map(r => r.nomeCognome));
  const cantSet  = new Set(d.map(r => r.cantiere).filter(Boolean));
  const presSet  = new Set(d.map(r => r.nomeCognome + '|' + r.data));
  const giorni   = new Set(d.map(r => r.data)).size;
  document.getElementById('kpis').innerHTML = [
    { l:'Presenze totali',    v: presSet.size, s:'entrate uniche dip×giorno', c:'var(--accent)' },
    { l:'Dipendenti attivi',  v: dipSet.size,  s:'nel periodo selezionato',   c:'var(--accent2)' },
    { l:'Cantieri attivi',    v: cantSet.size, s:'con almeno 1 entrata',       c:'var(--accent3)' },
    { l:'Giorni con presenze',v: giorni,       s:'giorni distinti',            c:'var(--accent4)' },
  ].map(k => `
    <div class="kpi" style="--kc:${k.c}">
      <div class="kpi-label">${k.l}</div>
      <div class="kpi-value">${k.v}</div>
      <div class="kpi-sub">${k.s}</div>
    </div>`).join('');
}

function renderBar(d) {
  const giorni = [...new Set(d.map(r => r.data))].sort();
  const cants  = cantSelected === 'all'
    ? [...new Set(d.map(r => r.cantiere))].filter(Boolean).sort()
    : [cantSelected];
  document.getElementById('bar-lbl').textContent = fmtMese(meseSelected);
  const ctx = document.getElementById('c-bar').getContext('2d');
  if (chartBar) chartBar.destroy();
  chartBar = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: giorni.map(g => g.slice(8) + '/' + g.slice(5,7)),
      datasets: cants.map((c, i) => ({
        label: c.length > 22 ? c.slice(0,22)+'…' : c,
        data:  giorni.map(g => new Set(d.filter(r => r.data===g && r.cantiere===c).map(r => r.nomeCognome)).size),
        backgroundColor: COLORS[i % COLORS.length] + 'bb',
        borderColor:     COLORS[i % COLORS.length],
        borderWidth: 1, borderRadius: 3, stack: 's',
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#6b7280', font:{size:10}, boxWidth:10 } } },
      scales: {
        x: { ticks:{color:'#6b7280',font:{size:9}}, grid:{color:'#2a3045'}, stacked:true },
        y: { ticks:{color:'#6b7280',stepSize:1},    grid:{color:'#2a3045'}, beginAtZero:true, stacked:true },
      },
    },
  });
}

function renderPie(d) {
  const counts = {};
  d.forEach(r => { counts[r.cantiere] = (counts[r.cantiere]||0) + 1; });
  const labels = Object.keys(counts).filter(Boolean);
  const ctx = document.getElementById('c-pie').getContext('2d');
  if (chartPie) chartPie.destroy();
  chartPie = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: labels.map(l => counts[l]), backgroundColor: COLORS.slice(0, labels.length), borderWidth:0, hoverOffset:5 }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: { legend: { position:'bottom', labels:{ color:'#6b7280', font:{size:10}, padding:8, boxWidth:10 } } },
    },
  });
}

function renderHeatmap(d) {
  const giorni = [...new Set(d.map(r => r.data))].sort();
  const dips   = [...new Set(d.map(r => r.nomeCognome))].sort();
  const allC   = [...new Set(d.map(r => r.cantiere))].filter(Boolean).sort();
  const cColor = {}; allC.forEach((c, i) => cColor[c] = COLORS[i % COLORS.length]);

  let html = `<div class="hm-day-labels">${giorni.map(g => `<div class="hm-day-label">${g.slice(8)}</div>`).join('')}</div>`;

  dips.forEach(dip => {
    html += `<div class="heatmap-row"><div class="hm-label" title="${dip}">${dip}</div>`;
    giorni.forEach(g => {
      const entries = d.filter(r => r.nomeCognome === dip && r.data === g);
      const n   = entries.length;
      const col = n ? (cColor[entries[0].cantiere] || '#4f8ef7') : '#1e2334';
      const tip = n ? `${dip}\n${entries[0].dataFmt}  ${entries[0].ora}\n${entries[0].cantiere}` : '';
      html += `<div class="hm-cell" style="background:${col};opacity:${n ? .88 : .12}" data-tip="${tip.replace(/"/g,'&quot;')}" onmouseenter="showTip(event,this)" onmouseleave="hideTip()"></div>`;
    });
    html += '</div>';
  });

  document.getElementById('hm').innerHTML = html;
  document.getElementById('hm-lbl').textContent = fmtMese(meseSelected);
}

function renderTable(d) {
  document.getElementById('tbl-lbl').textContent = `${d.length} entrate`;
  document.getElementById('tbl').innerHTML = [...d]
    .sort((a,b) => b.data.localeCompare(a.data))
    .slice(0, 300)
    .map(r => `
      <tr>
        <td style="font-family:monospace;font-size:11px">${r.dataFmt}</td>
        <td style="font-family:monospace;font-size:11px">${r.ora}</td>
        <td>${r.nomeCognome}</td>
        <td style="color:var(--muted);font-size:11px">${r.matricola}</td>
        <td><span class="pill">${r.cantiere.length>28 ? r.cantiere.slice(0,28)+'…' : r.cantiere}</span></td>
      </tr>`).join('');
}

function renderDipList(d) {
  const lbl = cantSelected === 'all' ? 'tutti i cantieri' : (cantSelected.length>24 ? cantSelected.slice(0,24)+'…' : cantSelected);
  document.getElementById('dip-lbl').textContent = lbl;
  const dc = {};
  d.forEach(r => { if (!dc[r.nomeCognome]) dc[r.nomeCognome] = new Set(); dc[r.nomeCognome].add(r.data); });
  const sorted = Object.entries(dc).sort((a,b) => b[1].size - a[1].size);
  document.getElementById('dips').innerHTML = sorted.length
    ? sorted.map(([n, gs]) => `<div class="dip-row"><span>${n}</span><span class="dip-giorni">${gs.size} gg</span></div>`).join('')
    : '<div class="no-data">nessun dato</div>';
}

function showTip(e, el) {
  const tip = document.getElementById('tip');
  const txt = el.getAttribute('data-tip');
  if (!txt) return;
  tip.textContent = txt;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 8)  + 'px';
}
function hideTip() { document.getElementById('tip').style.display = 'none'; }

// ── AVVIO ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
